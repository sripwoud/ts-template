name: Sync Template
on:
  repository_dispatch:
    types: [template-sync]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: AndreasAugustin/actions-template-sync@v2
        with:
          pr_title: "chore: upstream merge template repository"
          source_repo_path: sripwoud/agnostic-template
